<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flex Advisor &mdash; DISTRIBUIDORA NATUPARTS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"><\/script>
  <style>
    :root {
      --yellow: #FFE600; --yellow-dark: #F5D800; --yellow-light: #FFFDE7;
      --blue: #3483FA; --blue-dark: #2968C8; --blue-light: #EBF3FF;
      --text-dark: #1A1A1A; --text-gray: #666666; --border: #E8E8E8;
      --white: #FFFFFF; --red: #E53935; --red-light: #FFF3F3;
      --green: #2E7D32; --green-light: #E8F5E9;
      --orange: #FF6D00; --orange-light: #FFF3E0;
      --amber: #FFA000; --amber-light: #FFF8E1;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.07); --shadow-md: 0 4px 16px rgba(0,0,0,0.10);
      --radius: 16px; --radius-sm: 10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: #F4F4F4; color: var(--text-dark); line-height: 1.6; }
    .sticky-header { background: var(--yellow); padding: 14px 32px; display: flex; align-items: center; justify-content: space-between; gap: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); position: sticky; top: 0; z-index: 100; }
    .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .header-nick { font-size: 15px; font-weight: 900; color: var(--text-dark); }
    .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 100px; font-size: 12px; font-weight: 800; }
    .badge-blue { background: var(--blue); color: #fff; }
    .badge-dark { background: rgba(0,0,0,0.10); color: var(--text-dark); }
    .badge-green { background: var(--green-light); color: var(--green); }
    .btn-pdf { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border: 2px solid rgba(0,0,0,0.2); background: rgba(0,0,0,0.08); color: var(--text-dark); font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 800; border-radius: 10px; cursor: pointer; white-space: nowrap; }
    .btn-pdf:hover { background: rgba(0,0,0,0.15); }
    .main { max-width: 900px; margin: 0 auto; padding: 40px 24px 0; }
    .anchor { background: var(--yellow); border-radius: var(--radius); padding: 44px 40px; margin-bottom: 40px; text-align: center; box-shadow: var(--shadow-md); position: relative; overflow: hidden; }
    .anchor::after { content: ''; position: absolute; top: 0; right: 0; width: 180px; height: 100%; background: rgba(0,0,0,0.04); clip-path: polygon(40% 0, 100% 0, 100% 100%, 0% 100%); }
    .anchor-eye { font-size: 11px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(0,0,0,0.45); margin-bottom: 10px; }
    .anchor-num { font-size: clamp(60px, 10vw, 100px); font-weight: 900; color: var(--text-dark); line-height: 1; margin-bottom: 10px; }
    .anchor-lbl { font-size: 22px; font-weight: 700; color: var(--text-dark); max-width: 540px; margin: 0 auto; line-height: 1.3; }
    .anchor-sub { font-size: 14px; font-weight: 600; color: rgba(0,0,0,0.45); margin-top: 12px; }
    .identity-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 40px; }
    .section { margin-bottom: 52px; }
    .sec-tag { font-size: 11px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-gray); display: block; margin-bottom: 6px; }
    .sec-title { font-size: 24px; font-weight: 900; color: var(--text-dark); margin-bottom: 24px; display: flex; align-items: center; gap: 12px; }
    .sec-title::before { content: ''; width: 5px; height: 26px; background: var(--yellow); border-radius: 3px; flex-shrink: 0; }
    .sit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    .sit-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px 24px; text-align: center; box-shadow: var(--shadow-sm); }
    .sit-main { border: 2px solid var(--amber); background: var(--amber-light); }
    .sit-num { font-size: 42px; font-weight: 900; line-height: 1; margin-bottom: 8px; }
    .sit-lbl { font-size: 15px; font-weight: 800; color: var(--text-dark); margin-bottom: 4px; }
    .sit-sub { font-size: 13px; color: var(--text-gray); font-weight: 600; }
    .util-bar { width: 100%; height: 8px; background: #E0E0E0; border-radius: 4px; margin-top: 14px; overflow: hidden; }
    .util-fill { height: 100%; border-radius: 4px; }
    .col-btn { display: flex; align-items: center; background: none; border: 1px solid var(--border); border-radius: 10px; padding: 12px 20px; font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700; color: var(--text-gray); cursor: pointer; width: 100%; text-align: left; gap: 8px; }
    .col-btn:hover { background: #F9F9F9; }
    .col-arrow { transition: transform 0.3s; }
    .col-btn.open .col-arrow { transform: rotate(180deg); }
    .col-body { display: none; margin-top: 16px; }
    .col-body.open { display: block; }
    .cfg-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 14px; }
    .cfg-table th { background: #F5F5F5; padding: 10px 16px; text-align: left; font-weight: 800; border-bottom: 2px solid var(--border); }
    .cfg-table td { padding: 12px 16px; border-bottom: 1px solid var(--border); font-weight: 600; }
    .cfg-table tr:last-child td { border-bottom: none; }
    .ok { color: var(--green); font-weight: 800; } .no { color: var(--red); font-weight: 800; }
    .zones { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .zone { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; display: flex; align-items: flex-start; gap: 10px; }
    .zone.z-ok { background: var(--white); } .zone.z-no { background: #FFF5F5; border-color: #FFCDD2; }
    .zone-n { font-size: 13px; font-weight: 800; } .zone-s { font-size: 11px; color: var(--text-gray); font-weight: 600; }
    .chart-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 28px; }
    .chart-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow-sm); }
    .chart-title { font-size: 15px; font-weight: 800; color: var(--text-dark); margin-bottom: 4px; }
    .chart-sub { font-size: 12px; color: var(--text-gray); font-weight: 600; margin-bottom: 16px; }
    .chart-wrap { position: relative; }
    .opp-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .opp-label { font-size: 13px; font-weight: 700; width: 130px; flex-shrink: 0; color: var(--text-dark); }
    .opp-bar-wrap { flex: 1; background: #F0F0F0; border-radius: 6px; height: 28px; overflow: hidden; }
    .opp-bar { height: 100%; border-radius: 6px; display: flex; align-items: center; padding-left: 10px; font-size: 12px; font-weight: 800; color: var(--white); }
    .opp-count { font-size: 13px; font-weight: 800; color: var(--text-dark); width: 60px; text-align: right; }
    .opp-callout { background: var(--orange-light); border-left: 4px solid var(--orange); border-radius: 10px; padding: 16px 20px; font-size: 15px; font-weight: 700; color: var(--text-dark); line-height: 1.6; margin-top: 20px; }
    .bench-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 20px; }
    .bench-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 20px; text-align: center; box-shadow: var(--shadow-sm); }
    .bench-card.gap { border-color: var(--red); background: var(--red-light); }
    .bench-card.ok-bench { border-color: var(--green); background: var(--green-light); }
    .bench-num-seller { font-size: 28px; font-weight: 900; margin-bottom: 2px; }
    .bench-num-bench { font-size: 14px; font-weight: 700; color: var(--text-gray); margin-bottom: 6px; }
    .bench-lbl { font-size: 12px; font-weight: 700; color: var(--text-gray); }
    .bench-note { font-size: 11px; color: var(--text-gray); font-weight: 600; margin-top: 16px; font-style: italic; }
    .action-cards { display: flex; flex-direction: column; gap: 24px; }
    .action-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; box-shadow: var(--shadow-sm); display: flex; gap: 20px; }
    .action-card:first-child { box-shadow: var(--shadow-md); }
    .action-num { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 900; color: var(--text-dark); background: var(--yellow); flex-shrink: 0; margin-top: 2px; }
    .action-body { flex: 1; }
    .action-timing { display: inline-block; background: var(--blue); color: #fff; font-size: 11px; font-weight: 800; padding: 3px 12px; border-radius: 100px; margin-bottom: 10px; }
    .action-title { font-size: 19px; font-weight: 900; margin-bottom: 10px; line-height: 1.3; }
    .action-why { font-size: 15px; font-weight: 600; line-height: 1.7; margin-bottom: 14px; }
    .action-fact { background: var(--yellow-light); border-left: 3px solid var(--yellow-dark); border-radius: 8px; padding: 12px 16px; font-size: 14px; font-weight: 700; margin-bottom: 14px; line-height: 1.6; }
    .action-how { background: #F5F5F5; border-radius: 8px; padding: 12px 18px; font-size: 13px; font-weight: 700; color: var(--text-gray); margin-bottom: 14px; line-height: 1.6; }
    .action-result { display: inline-flex; align-items: center; gap: 6px; background: var(--green-light); color: var(--green); font-size: 13px; font-weight: 800; padding: 8px 16px; border-radius: 100px; }
    .carrier-block { background: #F9F9FF; border: 1px solid #E0E8FF; border-radius: var(--radius-sm); padding: 18px 20px; margin-top: 18px; }
    .carrier-block-title { font-size: 13px; font-weight: 800; color: var(--blue); margin-bottom: 12px; }
    .carrier-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .carrier-mini { display: flex; align-items: center; gap: 10px; background: var(--white); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; }
    .carrier-dot { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 900; color: #fff; flex-shrink: 0; }
    .carrier-name { font-size: 13px; font-weight: 800; } .carrier-detail { font-size: 11px; color: var(--text-gray); } .carrier-phone { font-size: 11px; color: var(--blue); font-weight: 700; }
    .carrier-src { font-size: 11px; color: var(--text-gray); font-style: italic; margin-top: 8px; }
    .attention { background: var(--white); border: 2px solid var(--amber); border-radius: var(--radius); padding: 20px 24px; display: flex; gap: 14px; align-items: flex-start; margin-bottom: 24px; box-shadow: var(--shadow-sm); }
    .attention-icon { font-size: 26px; flex-shrink: 0; } .attention-title { font-size: 16px; font-weight: 800; margin-bottom: 4px; } .attention-body { font-size: 14px; color: var(--text-gray); font-weight: 600; line-height: 1.6; }
    .closing { background: var(--yellow); padding: 56px 24px; text-align: center; margin-top: 24px; }
    .closing-h { font-size: clamp(22px, 3.5vw, 36px); font-weight: 900; margin-bottom: 14px; max-width: 600px; margin-left: auto; margin-right: auto; line-height: 1.2; }
    .closing-b { font-size: 17px; font-weight: 600; max-width: 480px; margin: 0 auto 28px; line-height: 1.6; opacity: 0.75; }
    .closing-sep { border: none; border-top: 2px solid rgba(0,0,0,0.12); max-width: 200px; margin: 0 auto 24px; }
    .closing-cta { font-size: 20px; font-weight: 900; margin-bottom: 6px; } .closing-note { font-size: 12px; color: rgba(0,0,0,0.4); font-weight: 600; }
    @media print {
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      body { background: white !important; }
      .sticky-header { position: static !important; box-shadow: none !important; border-bottom: 3px solid #FFE600; margin-bottom: 24px; }
      .btn-pdf { display: none !important; } .col-btn { display: none !important; } .col-body { display: block !important; }
      .action-card { break-inside: avoid; } .section { break-inside: avoid; margin-bottom: 32px; } .closing { break-inside: avoid; }
    }
    @media (max-width: 700px) {
      .sit-grid, .bench-grid, .chart-grid, .carrier-grid, .zones { grid-template-columns: 1fr; }
      .action-card { flex-direction: column; gap: 12px; }
    }
  </style>
</head>
<body>
<header class="sticky-header">
  <img src="https://raw.githubusercontent.com/alejandropenaosorio2503/logo/main/ML_es_RGB_ML-Color-Izquierda.png" alt="Mercado Libre" height="32" />
  <div class="header-right">
    <span class="header-nick">DISTRIBUIDORA NATUPARTS</span>
    <span class="badge badge-blue">CrownJewels</span>
    <span class="badge badge-dark">&#128205; Bello, Antioquia</span>
    <span class="badge badge-green">&#10003; FULL/FLEX</span>
  </div>
  <button class="btn-pdf" onclick="window.print()">&#8595; PDF</button>
</header>

<div class="main">

  <div class="anchor">
    <div class="anchor-eye">Oportunidad Flex &mdash; Marzo 2026</div>
    <div class="anchor-num">1.075</div>
    <div class="anchor-lbl">pedidos por mes que salen desde Bello y podr&iacute;an llegar el mismo d&iacute;a</div>
    <div class="anchor-sub">Hoy van por cross-docking. Con Flex, llegan en horas &mdash; sin mover el inventario a Full.</div>
  </div>

  <div class="identity-row">
    <span class="badge badge-dark" style="padding:8px 14px;font-size:13px;">&#128295; Vertical principal: Repuestos &amp; Accesorios para Veh&iacute;culos</span>
    <span class="badge badge-dark" style="padding:8px 14px;font-size:13px;">&#128722; 2.272 productos elegibles Flex</span>
    <span class="badge badge-dark" style="padding:8px 14px;font-size:13px;">&#128197; Enero &mdash; Abril 2026 analizado</span>
  </div>

  <div class="section">
    <span class="sec-tag">Situaci&oacute;n</span>
    <h2 class="sec-title">&iquest;C&oacute;mo est&aacute; su Flex hoy?</h2>
    <div class="sit-grid">
      <div class="sit-card sit-main">
        <div class="sit-num" style="color:var(--amber);">7 / 19</div>
        <div class="sit-lbl">Pedidos Flex por d&iacute;a</div>
        <div class="sit-sub">37% de los cupos disponibles usados en los &uacute;ltimos 90 d&iacute;as</div>
        <div class="util-bar"><div class="util-fill" style="width:37%;background:var(--amber);"></div></div>
      </div>
      <div class="sit-card">
        <div class="sit-num" style="color:var(--orange);">4 de 6</div>
        <div class="sit-lbl">Zonas con entrega el mismo d&iacute;a</div>
        <div class="sit-sub">Guarne y Rionegro sin cubrir &middot; Cierre 12:00 PM</div>
      </div>
    </div>
    <button class="col-btn" id="col-btn" onclick="toggleCol()">
      <span>Ver configuraci&oacute;n completa y zonas</span>
      <span class="col-arrow" style="margin-left:auto;">&#9662;</span>
    </button>
    <div class="col-body" id="col-body">
      <table class="cfg-table" style="margin-top:16px;">
        <thead><tr><th>D&iacute;a</th><th>Cupos diarios *</th><th>Cierre</th><th>Estado</th></tr></thead>
        <tbody>
          <tr><td>Lunes a viernes</td><td>19/d&iacute;a</td><td>12:00 PM</td><td class="ok">&#10003; Activo</td></tr>
          <tr><td>S&aacute;bados</td><td>19/d&iacute;a</td><td>12:00 PM</td><td class="ok">&#10003; Activo</td></tr>
          <tr><td>Domingos</td><td>&mdash;</td><td>&mdash;</td><td class="no">&#10007; Inactivo</td></tr>
        </tbody>
      </table>
      <p style="font-size:11px;color:var(--text-gray);font-style:italic;margin-bottom:16px;">* Los cupos diarios los configura el propio vendedor en su panel. El sistema de Mercado Libre asigna la capacidad operativa seg&uacute;n el historial.</p>
      <div class="zones">
        <div class="zone z-ok"><span>&#9989;</span><div><div class="zone-n">Bello</div><div class="zone-s">CO-ANT-Bello</div></div></div>
        <div class="zone z-ok"><span>&#9989;</span><div><div class="zone-n">Medell&iacute;n</div><div class="zone-s">CO-ANT-Medellin</div></div></div>
        <div class="zone z-ok"><span>&#9989;</span><div><div class="zone-n">Copacabana</div><div class="zone-s">CO-ANT-Copacabana</div></div></div>
        <div class="zone z-ok"><span>&#9989;</span><div><div class="zone-n">Valle de Aburrá Sur</div><div class="zone-s">CO-ANT-Valle-de-Aburra-Sur</div></div></div>
        <div class="zone z-no"><span>&#10060;</span><div><div class="zone-n" style="color:var(--red);">Guarne</div><div class="zone-s">CO-ANT-Guarne</div></div></div>
        <div class="zone z-no"><span>&#10060;</span><div><div class="zone-n" style="color:var(--red);">Rionegro</div><div class="zone-s">CO-ANT-Rionegro</div></div></div>
      </div>
    </div>
  </div>

  <div class="section">
    <span class="sec-tag">Tendencia</span>
    <h2 class="sec-title">Ventas por log&iacute;stica &mdash; &uacute;ltimos 3 meses</h2>
    <div class="chart-grid">
      <div class="chart-card">
        <div class="chart-title">Env&iacute;os mensuales por canal</div>
        <div class="chart-sub">Full (FBM), Flex y Cross-Docking (XD) &mdash; Ene a Abr 2026</div>
        <div class="chart-wrap" style="height:220px;"><canvas id="chartBar"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Distribuci&oacute;n Marzo 2026</div>
        <div class="chart-sub">Del total de pedidos ME2</div>
        <div class="chart-wrap" style="height:220px;"><canvas id="chartDonut"></canvas></div>
      </div>
    </div>
    <div class="chart-card" style="margin-bottom:20px;">
      <div class="chart-title">&#127919; D&oacute;nde est&aacute; la oportunidad Flex en Marzo 2026</div>
      <div class="chart-sub" style="margin-bottom:20px;">De 2.297 pedidos totales (ME2) &mdash; &iquest;cu&aacute;les podr&iacute;an llegar el mismo d&iacute;a?</div>
      <div class="opp-row">
        <span class="opp-label">Full (FBM)</span>
        <div class="opp-bar-wrap"><div class="opp-bar" style="width:41%;background:#3483FA;">41%</div></div>
        <span class="opp-count">954</span>
      </div>
      <div class="opp-row">
        <span class="opp-label">Flex &#10003;</span>
        <div class="opp-bar-wrap"><div class="opp-bar" style="width:12%;background:#2E7D32;">12%</div></div>
        <span class="opp-count">268</span>
      </div>
      <div class="opp-row">
        <span class="opp-label" style="color:var(--orange);font-weight:900;">Cross-Docking</span>
        <div class="opp-bar-wrap"><div class="opp-bar" style="width:47%;background:var(--orange);">47% &larr; Oportunidad</div></div>
        <span class="opp-count" style="color:var(--orange);font-weight:900;">1.075</span>
      </div>
      <div class="opp-callout">
        &#128200; <strong>1.075 pedidos</strong> salieron por Cross-Docking en marzo. Son entregas que ya salen desde Bello,
        no est&aacute;n en el almac&eacute;n de Full, y hoy no llegan el mismo d&iacute;a.
        Con Flex bien configurado, esos pedidos se convierten en &ldquo;Llega Hoy&rdquo;.
      </div>
    </div>
  </div>

  <div class="section">
    <span class="sec-tag">Contexto competitivo</span>
    <h2 class="sec-title">Vs. 213 vendedores similares en Colombia</h2>
    <p style="font-size:14px;color:var(--text-gray);font-weight:600;margin-top:-16px;margin-bottom:24px;">Vendedores del mismo segmento (MeliPro / CrownJewels) con capacidad operativa parecida, activos en Flex de lunes a viernes.</p>
    <div class="bench-grid">
      <div class="bench-card gap">
        <div class="bench-num-seller" style="color:var(--red);">12:00 PM</div>
        <div class="bench-num-bench">Promedio del grupo: 1:00 PM</div>
        <div class="bench-lbl">Hora de cierre</div>
      </div>
      <div class="bench-card gap">
        <div class="bench-num-seller" style="color:var(--amber);">19 / d&iacute;a</div>
        <div class="bench-num-bench">Promedio del grupo: 33/d&iacute;a</div>
        <div class="bench-lbl">Cupos configurados</div>
      </div>
      <div class="bench-card ok-bench">
        <div class="bench-num-seller" style="color:var(--green);">&#10003; Activo</div>
        <div class="bench-num-bench">Solo el 32% del grupo lo hace</div>
        <div class="bench-lbl">Opera s&aacute;bados</div>
      </div>
    </div>
    <p class="bench-note">Fuente: DM_MKP_COMMERCE_SHIPPING_FLEX_GENERAL &middot; MCO &middot; Abril 2026 &middot; n=213 vendedores</p>
  </div>

  <div class="section">
    <span class="sec-tag">Plan de acci&oacute;n</span>
    <h2 class="sec-title">2 cambios para crecer m&aacute;s con Flex</h2>
    <p style="font-size:15px;color:var(--text-gray);font-weight:600;margin-top:-16px;margin-bottom:28px;">El primero se puede hacer en 5 minutos desde el panel de Mercado Libre.</p>
    <div class="attention">
      <span class="attention-icon">&#128270;</span>
      <div>
        <div class="attention-title">Est&aacute; usando el 37% de su capacidad</div>
        <div class="attention-body">Promedia 7 env&iacute;os sobre 19 cupos disponibles. El problema no es la capacidad configurada &mdash; es la visibilidad. Los cambios abajo aumentan la demanda primero; los cupos se ajustan despu&eacute;s.</div>
      </div>
    </div>
    <div class="action-cards">
      <div class="action-card">
